spring:
  application:
    name: pangochain-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pangochain}?stringtype=unspecified
    username: ${DB_USER:pangochain}
    password: ${DB_PASSWORD:pangochain_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 5
      connection-timeout: 30000      # 30s to obtain a connection before failing fast
      idle-timeout: 600000           # 10 min
      max-lifetime: 1800000          # 30 min — under Postgres/router idle kill windows
      leak-detection-threshold: 60000  # warn if a connection is held > 60s (slow Fabric path)

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    # NOTE: open-in-view is intentionally left enabled (true) for now. Flipping it to false
    # is the correct production target — it stops a Hikari connection being pinned for the
    # whole request across multi-second Fabric calls — BUT several controllers currently
    # access LAZY associations (e.g. user.getFirm()) outside a transaction and rely on the
    # open session to lazy-load them. Setting false without first adding @Transactional /
    # JOIN FETCH / @EntityGraph boundaries throws LazyInitializationException (HTTP 500).
    # Deferred to the backend N+1/fetch-boundary wave, where it must be flipped together.
    open-in-view: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 30
        order_inserts: true
        order_updates: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
  tomcat:
    threads:
      max: 200
      min-spare: 20
    max-connections: 8192
    accept-count: 100
    connection-timeout: 20000

jwt:
  secret: ${JWT_SECRET:pangochain-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm}
  access-token-expiry: 900        # 15 minutes in seconds
  refresh-token-expiry: 604800    # 7 days in seconds

fabric:
  # Fabric network is running — hardcoded true for experiment session
  enabled: true
  # Peer gRPC endpoint for Gateway SDK connection
  peer-endpoint: ${FABRIC_PEER_ENDPOINT:localhost:7051}
  peer-host-override: ${FABRIC_PEER_HOST_OVERRIDE:peer0.firma.pangochain.com}
  msp-id: ${FABRIC_MSP_ID:FirmAMSP}
  # Paths to admin identity material (mounted from crypto-config volume)
  cert-path: ${FABRIC_CERT_PATH:config/fabric/crypto/admin-cert.pem}
  key-path: ${FABRIC_KEY_PATH:config/fabric/crypto/admin-key.pem}
  tls-cert-path: ${FABRIC_TLS_CERT_PATH:config/fabric/crypto/tls-ca-cert.pem}
  channel-name: ${FABRIC_CHANNEL:legal-channel}
  chaincode-name: ${FABRIC_CHAINCODE:legalcc}

ipfs:
  api:
    host: ${IPFS_API_HOST:http://localhost}
    port: ${IPFS_API_PORT:5001}
    host2: ${IPFS_API_HOST2:http://localhost}   # secondary — pin for redundancy
    port2: ${IPFS_API_PORT2:5002}
  gateway:
    host: ${IPFS_GW_HOST:http://localhost}
    port: ${IPFS_GW_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.pangochain: INFO
    org.springframework.security: WARN
