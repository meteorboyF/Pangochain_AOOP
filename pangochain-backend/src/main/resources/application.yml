spring:
  application:
    name: pangochain-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pangochain}?stringtype=unspecified
    username: ${DB_USER:pangochain}
    password: ${DB_PASSWORD:pangochain_secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

jwt:
  secret: ${JWT_SECRET:pangochain-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm}
  access-token-expiry: 900        # 15 minutes in seconds
  refresh-token-expiry: 604800    # 7 days in seconds

fabric:
  # Set to true only when Hyperledger Fabric network is running
  enabled: ${FABRIC_ENABLED:false}
  # Peer gRPC endpoint for Gateway SDK connection
  peer-endpoint: ${FABRIC_PEER_ENDPOINT:localhost:7051}
  peer-host-override: ${FABRIC_PEER_HOST_OVERRIDE:peer0.firma.pangochain.com}
  msp-id: ${FABRIC_MSP_ID:FirmAMSP}
  # Paths to admin identity material (mounted from crypto-config volume)
  cert-path: ${FABRIC_CERT_PATH:config/fabric/crypto/admin-cert.pem}
  key-path: ${FABRIC_KEY_PATH:config/fabric/crypto/admin-key.pem}
  tls-cert-path: ${FABRIC_TLS_CERT_PATH:config/fabric/crypto/tls-ca-cert.pem}
  channel-name: ${FABRIC_CHANNEL:legal-channel}
  chaincode-name: ${FABRIC_CHAINCODE:legalcc}

ipfs:
  api:
    host: ${IPFS_API_HOST:http://localhost}
    port: ${IPFS_API_PORT:5001}
  gateway:
    host: ${IPFS_GW_HOST:http://localhost}
    port: ${IPFS_GW_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.pangochain: INFO
    org.springframework.security: WARN
